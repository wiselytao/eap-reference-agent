llm:
  provider: azure_openai
  base_url: "https://e800-ai-coding.openai.azure.com"
  model: "gpt-4.1"
  api_key_ref: "AOAI_KEY"
  temperature: 0.2
  max_tokens: 512
  extra:
    api_version: "2025-01-01-preview"
  plan_builder:
    provider: ""
    base_url: ""
    model: ""
    api_key_ref: ""
    temperature: 0.2
    max_tokens: 512
    extra: {}
  evaluator:
    provider: ""
    base_url: ""
    model: ""
    api_key_ref: ""
    temperature: 0.2
    max_tokens: 512
    extra: {}

runtime:
  streaming_default: false
  timeout_seconds: 300
  concurrency: 4

audit:
  trace_dir: "data/traces"
  retention_days: 30

security:
  allowed_profiles:
    - "default"

observability:
  log_level: "INFO"

profiling_dir: "tools/profiling"
profiling_timeout_seconds: 300
profiling_max_retries: 2
profiling_retry_backoff_seconds: 2
