{% extends "admin/base.html" %}

{% block content %}
<section class="admin-panel">
  <h2>Overview</h2>
  <p>
    This admin surface provides a read-only runtime snapshot for the current
    Reference Agent deployment.
  </p>
</section>
<section class="admin-panel">
  <h2>Runtime Summary</h2>
  <div class="admin-overview-grid">
    {% for item in overview.summary_items %}
    <div class="admin-stat-card">
      <div class="admin-stat-label">{{ item.label }}</div>
      <div class="admin-stat-value">{{ item.value }}</div>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
