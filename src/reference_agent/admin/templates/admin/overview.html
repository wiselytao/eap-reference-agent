{% extends "admin/base.html" %}

{% block content %}
<section class="admin-panel">
  <h2>Overview</h2>
  <p>
    This admin surface provides a read-only runtime snapshot for the current
    Reference Agent deployment.
  </p>
</section>
<section class="admin-panel">
  <h2>Runtime Summary</h2>
  <dl>
    {% for item in overview.summary_items %}
    <dt>{{ item.label }}</dt>
    <dd>{{ item.value }}</dd>
    {% endfor %}
  </dl>
</section>
{% endblock %}
